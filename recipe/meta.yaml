{% set name = "ocean-wave-tracing" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ocean_wave_tracing-{{ version }}.tar.gz
  sha256: 54a06d09a0b57683686405ba15dbf51aed03a85ebd05a20321e2060bb1fae073

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.5
    - numpy >=1.23
    - scipy >=1.9
    - netcdf4 >=1.6
    - xarray >=2022.6.0
    - pyproj >=2.3
    - cartopy >0.21
    - cmocean >2.0

test:
  imports:
    - ocean_wave_tracing
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/hevgyrt/ocean_wave_tracing
  summary: 'A numerical solver of the wave ray equations for ocean waves.'
  description: |
    This project provides a numerical solver of the wave ray equations for ocean waves 
    subject to ambient currents at arbitrary depths.
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hevgyrt
    
